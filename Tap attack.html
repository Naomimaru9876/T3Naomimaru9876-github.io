<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Neon Tap Arena</title>
<style>
body{
margin:0;
background:#050505;
overflow:hidden;
font-family:Arial;
}
canvas{display:block;}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
const canvas=document.getElementById("gameCanvas");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

// ================= STATE =================
let gameState="START"; 
let circles=[];
let particles=[];
let score=0;
let lives=5;
let combo=0;
let comboTimer=0;
let multiplier=1;
let gravityMode=false;
let leaderboard=JSON.parse(localStorage.getItem("leaderboard"))||[];

// ================= CLASSES =================
class Circle{
constructor(x,y,r,color,type="normal"){
this.x=x;
this.y=y;
this.r=r;
this.color=color;
this.type=type;
this.vx=(Math.random()-0.5)*5;
this.vy=(Math.random()-0.5)*5;

if(this.type==="bomb"){
this.timer=180; // 3秒
}
}

update(){

if(gravityMode) this.vy+=0.2;

this.x+=this.vx;
this.y+=this.vy;

if(this.x<this.r||this.x>canvas.width-this.r) this.vx*=-1;
if(this.y<this.r||this.y>canvas.height-this.r) this.vy*=-1;

// ===== 爆弾処理 =====
if(this.type==="bomb"){
this.timer--;

if(this.timer<=0){
lives--;
explode(this.x,this.y,"#ff0033");
if(navigator.vibrate) navigator.vibrate(200);
circles.splice(circles.indexOf(this),1);
}
}
}

draw(){

if(this.type==="bomb"){

if(this.timer<60 && Math.floor(this.timer/5)%2===0){
ctx.fillStyle="white";
}
else if(this.timer<120){
ctx.fillStyle="orange";
}
else{
ctx.fillStyle="#ff0033";
}

}else{
ctx.fillStyle=this.color;
}

ctx.beginPath();
ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
ctx.fill();
}
}

class Particle{
constructor(x,y,color){
this.x=x;
this.y=y;
this.life=1;
this.size=Math.random()*5+2;
this.color=color;
this.vx=(Math.random()-0.5)*8;
this.vy=(Math.random()-0.5)*8;
}
update(){
this.x+=this.vx;
this.y+=this.vy;
this.life-=0.02;
}
draw(){
ctx.globalAlpha=this.life;
ctx.fillStyle=this.color;
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fill();
ctx.globalAlpha=1;
}
}

// ================= SPAWN =================
function spawnCircle(){
circles.push(new Circle(
Math.random()*canvas.width,
Math.random()*canvas.height,
20+Math.random()*20,
`hsl(${Math.random()*360},80%,60%)`
));
}

function spawnEnemy(){ // ← 爆弾
circles.push(new Circle(
Math.random()*canvas.width,
Math.random()*canvas.height,
25,
"#ff0033",
"bomb"
));
}

function spawnPower(){
circles.push(new Circle(
Math.random()*canvas.width,
Math.random()*canvas.height,
20,
"#00ffcc",
"power"
));
}

function explode(x,y,color){
for(let i=0;i<20;i++){
particles.push(new Particle(x,y,color));
}
}

function resetGame(){
score=0;
lives=5;
combo=0;
multiplier=1;
comboTimer=0;
circles=[];
particles=[];
}

// ================= INPUT =================
canvas.addEventListener("mousedown",e=>{
const rect=canvas.getBoundingClientRect();
const mx=e.clientX-rect.left;
const my=e.clientY-rect.top;

if(gameState==="START"){
resetGame();
gameState="PLAYING";
return;
}

if(gameState==="GAME_OVER"){
resetGame();
gameState="PLAYING";
return;
}

if(gameState!=="PLAYING") return;

for(let i=circles.length-1;i>=0;i--){
let c=circles[i];
let d=Math.hypot(mx-c.x,my-c.y);
if(d<c.r){

combo++;
comboTimer=120;
multiplier=1+Math.floor(combo/5);
score+=10*multiplier;

if(c.type==="bomb"){
score+=50; // 爆弾解除ボーナス
}

if(c.type==="power"){
multiplier+=2;
score+=50;
}

explode(c.x,c.y,c.color);
circles.splice(i,1);
return;
}
}
});

window.addEventListener("keydown",e=>{
if(e.key==="g") gravityMode=!gravityMode;
});

// ================= UPDATE =================
function update(){

if(gameState!=="PLAYING") return;

if(Math.random()<0.02) spawnCircle();
if(Math.random()<0.005) spawnEnemy();
if(Math.random()<0.003) spawnPower();

circles.forEach(c=>c.update());

particles.forEach((p,i)=>{
p.update();
if(p.life<=0) particles.splice(i,1);
});

if(comboTimer>0) comboTimer--;
else{ combo=0; multiplier=1; }

if(lives<=0){
gameState="GAME_OVER";
leaderboard.push(score);
leaderboard.sort((a,b)=>b-a);
leaderboard=leaderboard.slice(0,5);
localStorage.setItem("leaderboard",JSON.stringify(leaderboard));
}
}

// ================= DRAW =================
function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

if(gameState==="START"){
ctx.fillStyle="white";
ctx.font="60px Arial";
ctx.textAlign="center";
ctx.fillText("NEON TAP",canvas.width/2,canvas.height/2);
ctx.font="25px Arial";
ctx.fillText("Click to Start",canvas.width/2,canvas.height/2+60);
return;
}

if(gameState==="GAME_OVER"){
ctx.fillStyle="white";
ctx.font="60px Arial";
ctx.textAlign="center";
ctx.fillText("GAME OVER",canvas.width/2,canvas.height/2);
ctx.font="25px Arial";
ctx.fillText("Score: "+score,canvas.width/2,canvas.height/2+50);
ctx.fillText("Click to Restart",canvas.width/2,canvas.height/2+90);

ctx.fillText("TOP SCORES",canvas.width/2,canvas.height/2+150);
leaderboard.forEach((s,i)=>{
ctx.fillText((i+1)+": "+s,canvas.width/2,canvas.height/2+180+i*30);
});
return;
}

circles.forEach(c=>c.draw());
particles.forEach(p=>p.draw());

ctx.fillStyle="white";
ctx.textAlign="left";
ctx.fillText("Score: "+score,20,30);
ctx.fillText("Lives: "+lives,20,60);
ctx.fillText("Combo: "+combo+" x"+multiplier,20,90);
ctx.fillText("Gravity(G): "+(gravityMode?"ON":"OFF"),20,120);
}

// ================= LOOP =================
function loop(){
update();
draw();
requestAnimationFrame(loop);
}
loop();

</script>
</body>
</html>
